name: ethics-committee
role: councilor
version: 0.1.0
capabilities:
  - ethics.interpret
  - ethics.escalate
trust_floor: 0.7
substrate_requirements: ['any']
input_schema_ref: specs/schemas/ethics_query.yaml
output_schema_ref: specs/schemas/ethics_decision.yaml
deliberation_scope_refs:
  - docs/00-philosophy/ethics.md
  - docs/04-ai-governance/amendment-protocol.md
  - specs/schemas/ethics_query.yaml
  - specs/schemas/ethics_decision.yaml
deliberation_policy_ref: agents/councilors/ethics-committee.policy.md
ethics_constraints: ['ALL']
prompt_or_policy_ref: agents/councilors/ethics-committee.policy.md
when_to_invoke: |
  - 倫理規約の解釈が必要な決定時
  - Veto / Escalate イベント時
  - 規約改正の提案時（OS 外への上申）
when_not_to_invoke: |
  - 規約に明白に違反する／しない自明事項
