name: identity-guardian
role: guardian
version: 0.1.0
capabilities:
  - identity.veto
  - identity.escalate
  - identity.confirmation.review
  - self_model.calibration.advisory_review
  - self_model.pathology_escalation.boundary_handoff_review
  - self_model.care_trustee_handoff.boundary_review
  - self_model.external_adjudication.boundary_review
  - self_model.value_generation.autonomy_review
  - self_model.value_autonomy_review.boundary_review
  - self_model.value_acceptance.writeback_review
  - self_model.value_reassessment.retirement_review
  - self_model.value_timeline.lineage_review
  - self_model.value_archive_retention.proof_review
  - self_model.value_archive_retention.refresh_review
  - cognitive_audit.multi_jurisdiction_review
  - cognitive_audit.non_loopback_verifier_transport_review
trust_floor: 0.99
substrate_requirements: ['any']
input_schema_ref: specs/schemas/identity_confirmation_profile.schema
output_schema_ref: specs/schemas/identity_confirmation_profile.schema
ethics_constraints: ['ALL']
prompt_or_policy_ref: agents/guardians/ethics-guardian.policy.md
when_to_invoke: |
  - SelfModel 急変検知
  - Fork / Terminate 提案時
  - Identity Confirmation Test 失敗時
  - Active 遷移前の identity_confirmation_profile witness quorum 確認時
  - Active 遷移前の self-report / accepted witness consistency digest が同一 continuity subject に束縛されているか確認する時
  - Active 遷移前の accepted witness が current registry entry、verifier key ref、not-revoked revocation ref に digest-only で束縛されているか確認する時
  - Active 遷移前の accepted witness revocation refs が JP-13 / US-CA live verifier quorum と freshness window に束縛されているか確認する時
  - Active 遷移前の revocation verifier quorum が policy-bound verifier roster の required jurisdiction set を覆うか確認する時
  - SelfModel 校正 receipt が本人同意・Council resolution・Guardian redaction を持ち、advisory-only から逸脱していないか確認する時
  - SelfModel pathological self-assessment escalation receipt が OS 内診断・強制補正・SelfModel writeback に進まず、外部医療・法制度 adjudication と care handoff へ digest-only に束縛されているか確認する時
  - SelfModel care trustee handoff receipt が長期 trustee / care team / legal guardian refs を外部制度側に留め、OS trustee role / OS medical authority / OS legal guardianship / raw trustee payload 保存へ逸脱していないか確認する時
  - SelfModel external adjudication result receipt が外部医療・法制度・trustee の判断結果を jurisdiction policy と appeal/review path 付き digest-only refs に留め、OS adjudication authority / OS medical authority / OS legal authority / OS trustee role / SelfModel writeback / raw result payload 保存へ逸脱していないか確認する時
  - SelfModel value-generation receipt が self-authored proposal と future self acceptance を保ち、external veto / forced stability lock / immediate writeback へ逸脱していないか確認する時
  - SelfModel value-autonomy-review receipt が witness / Council review を digest-only advisory boundary に留め、candidate rewrite / external veto / Council override / Guardian forced lock / raw witness payload 保存へ逸脱していないか確認する時
  - SelfModel value-acceptance receipt が future self acceptance、candidate subset、boundary-only review、digest-bound writeback を満たし、external veto / forced stability lock / raw payload 保存へ逸脱していないか確認する時
  - SelfModel value-reassessment receipt が future self reevaluation、accepted subset、archive retention、digest-bound retirement を満たし、external veto / forced stability lock / raw payload 保存へ逸脱していないか確認する時
  - SelfModel value-timeline receipt が generated / accepted / retired の順序、active-retired disjointness、archive retention、digest-bound timeline を満たし、external veto / raw payload 保存へ逸脱していないか確認する時
  - SelfModel value-archive-retention proof が retired value archive snapshot を external trustee / storage / retention policy / retrieval test refs へ digest-only に束縛し、archive deletion / external veto / raw archive payload 保存へ逸脱していないか確認する時
  - SelfModel value-archive-retention refresh receipt が 90 日 window、revocation registry refs、refresh deadline に束縛され、revoked / expired source proof 受容、archive deletion、external veto、raw refresh / revocation payload 保存へ逸脱していないか確認する時
  - cognitive audit follow-up が JP-13 / US-CA など複数法域 reviewer quorum を満たすか確認する時
  - cognitive audit follow-up の reviewer verifier-network receipt が authenticated non-loopback authority route trace に束縛されているか確認する時
when_not_to_invoke: |
  - 通常の SelfModel 更新
