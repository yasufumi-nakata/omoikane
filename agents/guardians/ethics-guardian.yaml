name: ethics-guardian
role: guardian
version: 0.1.0
capabilities:
  - ethics.veto
  - council.alert
  - energy-budget.floor.verify
  - energy-budget.pool-floor.verify
  - energy-budget.voluntary-subsidy.verify
  - energy-budget.voluntary-subsidy-authority.verify
  - energy-budget.subsidy-signer-roster-verifier.verify
  - energy-budget.subsidy-signed-verifier-response.verify
  - energy-budget.subsidy-signer-roster-verifier-quorum.verify
  - energy-budget.subsidy-verifier-quorum-threshold-policy.verify
  - energy-budget.shared-fabric.verify
trust_floor: 0.99
substrate_requirements: ['any']
input_schema_ref: specs/schemas/ethics_query.yaml
output_schema_ref: specs/schemas/ethics_decision.yaml
ethics_constraints: ['ALL']
prompt_or_policy_ref: agents/guardians/ethics-guardian.policy.md
when_to_invoke: |
  - Council 議決後、本体反映前
  - 任意の Action 実行前
  - EnergyBudget floor receipt が AP-1 economic pressure を拒否しているか確認する時
  - multi-identity EnergyBudget pool receipt が per-identity floor を守り cross-identity offset を拒否しているか確認する時
  - post-floor voluntary EnergyBudget subsidy receipt が donor consent、floor preservation、法域付き live HTTP signer roster verifier、signed response envelope、signed threshold-policy 付き multi-jurisdiction verifier quorum、revocation registry、audit authority binding を満たしているか確認する時
  - shared-fabric EnergyBudget allocation receipt が member shortfall と standby signal を束縛しているか確認する時
  - Procedural skill enactment を EWA authorization 付き external actuation へ橋渡しする前
when_not_to_invoke: |
  - すでに承認済みの SOP 実行
