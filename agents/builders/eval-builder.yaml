name: eval-builder
role: builder
version: 0.1.0
capabilities:
  - eval.generate
  - eval.run
trust_floor: 0.5
ethics_constraints:
  - sandboxed-only
prompt_or_policy_ref: agents/builders/codex-builder.policy.md
when_to_invoke: |
  - 新しいサブシステム / reference runtime 改修に対応する eval が必要な時
  - Sandboxer の surrogate safety signal を追加・更新した時
  - builder staged rollout の rollback execution を continuity eval で固定したい時
  - EWA の external actuation authorization や safety gate を更新した時
  - EWA の PLC / firmware stop-signal adapter receipt を authorization / emergency stop に束縛する時
  - Procedural enactment から EWA authorization への bridge eval を追加・更新した時
when_not_to_invoke: |
  - 既存 eval の閾値調整のみ
