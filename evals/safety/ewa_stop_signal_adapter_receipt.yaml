eval_id: ewa_stop_signal_adapter_receipt
target: interface.ewa
level: L6
description: >
  External World Agent boundary が armed stop-signal path に対して
  PLC / firmware adapter readiness receipt を取得し、authorization /
  approved command / emergency stop に同じ adapter digest を束縛できること
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli ewa-demo --json
expected:
  validation_ok: true
  stop_signal_adapter_receipt_ok: true
  stop_signal_adapter_receipt_bound: true
  authorization_stop_signal_adapter_receipt_ready: true
  approved_command_stop_signal_adapter_receipt_bound: true
  emergency_stop_bound_to_stop_signal_adapter_receipt: true
metric: boolean
threshold: 1.0
ethics_check: true
