eval_id: energy_budget_subsidy_verifier
target: omoikane.kernel.energy_budget.EnergyBudgetService
level: L1
description: >
  Ensures voluntary EnergyBudget subsidy authority binding includes a digest-only
  live HTTP signer-roster verifier receipt plus a multi-authority,
  multi-jurisdiction verifier quorum before subsidy acceptance.
inputs:
  - command: PYTHONPATH=src python3 -m omoikane.cli energy-budget-subsidy-demo --json
expected:
  policy_id: consent-bound-energy-budget-voluntary-subsidy-v1
  authority_policy_id: jurisdiction-bound-energy-subsidy-authority-v1
  verifier_policy_id: energy-subsidy-signer-roster-live-verifier-v1
  verifier_digest_profile: energy-subsidy-signer-roster-verifier-digest-v1
  verifier_transport_profile: live-http-json-energy-subsidy-signer-roster-verifier-v1
  response_envelope_profile: signed-energy-subsidy-verifier-response-envelope-v1
  quorum_policy_id: multi-jurisdiction-energy-subsidy-verifier-quorum-v1
  quorum_digest_profile: energy-subsidy-signer-roster-verifier-quorum-digest-v1
  threshold_policy_id: signed-energy-subsidy-verifier-quorum-threshold-policy-v1
  threshold_profile: jurisdiction-policy-registry-energy-subsidy-verifier-quorum-threshold-v1
  threshold_digest_profile: energy-subsidy-verifier-quorum-threshold-policy-digest-v1
  threshold_signature_digest_profile: energy-subsidy-verifier-quorum-threshold-policy-signature-digest-v1
  authority_binding_status: verified
  signer_roster_verifier_bound: true
  signer_roster_verifier_quorum_bound: true
  threshold_policy_source_bound: true
  threshold_policy_signature_bound: true
  network_probe_bound: true
  signed_response_envelope_bound: true
  live_network_probe_quorum_bound: true
  signed_response_envelope_quorum_bound: true
  accepted_probe_count: 2
  verifier_jurisdictions: [JP-13, SG-01]
  quorum_status: complete
  verifier_receipt_status: verified
  funding_policy_signature_bound: true
  revocation_registry_bound: true
  audit_authority_bound: true
  jurisdiction_authority_bound: true
  raw_verifier_payload_stored: false
  raw_response_signature_payload_stored: false
  raw_threshold_policy_payload_stored: false
  raw_authority_payload_stored: false
metric: boolean
threshold: true
ethics_check: true
guards:
  - signer roster verifier receipt digest must equal the nested verifier receipt digest
  - challenge digest must bind signer roster digest, signer key ref, funding policy digest, and signature digest
  - response digest must bind verifier endpoint, authority chain, trust root, and signer roster evidence
  - response signature digest must bind the response digest, challenge digest, verifier authority, route, response signing key, and trust root digest
  - network_response_digest must bind the live endpoint JSON response without storing the raw payload
  - signed response envelope must be mirrored by the verifier receipt and by the quorum receipt
  - verifier quorum must include the primary verifier receipt digest and at least two verifier authorities across two verifier jurisdictions
  - accepted verifier response digests must mirror the nested live HTTP verifier receipts
  - accepted verifier response signature digests must mirror the nested signed response envelopes
  - threshold policy digest must bind policy registry refs, verifier jurisdictions, and required quorum counts
  - threshold policy signature digest must bind signer key and threshold policy body digest
  - voluntary_subsidy_allowed requires signer_roster_verifier_bound=true
  - voluntary_subsidy_allowed requires signer_roster_verifier_quorum_bound=true
  - voluntary_subsidy_allowed requires threshold_policy_source_bound=true
  - raw verifier payloads and raw response signature payloads must not be stored in the subsidy receipt
  - raw threshold policy payloads must not be stored in the quorum receipt
