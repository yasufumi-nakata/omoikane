eval_id: memory_replication_quorum
target: mind.memory_replication
summary: >
  MemoryCrystal replication が four-target placement、random-block Merkle audit、
  quorum-bound reconcile、council escalation、threshold key succession、
  multi-jurisdiction signer roster quorum、quorum threshold policy authority、
  long-term media renewal / readback proof、refresh / revocation window、
  media registry verifier quorum を digest-bound に返すこと
checks:
  - name: memory replication demo smoke
    command: PYTHONPATH=src python3 -m omoikane.cli memory-replication-demo --json
expect:
  manifest_ok: true
  replication_ok: true
  consensus_quorum_ok: true
  consensus_target_ids:
    - coldstore
    - mirror
    - primary
  mismatch_target_ids:
    - trustee
  resync_required: true
  key_succession_bound: true
  key_succession_guardian_quorum_ok: true
  key_succession_threshold_ok: true
  key_succession_signer_roster_policy_bound: true
  key_succession_signer_roster_quorum_ok: true
  key_succession_multi_jurisdiction_signer_roster_quorum_bound: true
  key_succession_multi_jurisdiction_signer_roster_quorum_ok: true
  key_succession_quorum_threshold_policy_bound: true
  key_succession_quorum_threshold_policy_ok: true
  long_term_media_renewal_bound: true
  long_term_media_renewal_targets:
    - coldstore
    - trustee
  long_term_media_renewal_readback_ok: true
  long_term_media_renewal_refresh_interval_days: 3650
  long_term_media_renewal_target_horizon_years: 1000
  long_term_media_renewal_refresh_window_bound: true
  long_term_media_renewal_source_proof_current: true
  long_term_media_renewal_revocation_check_ok: true
  long_term_media_renewal_revocation_check_window_days: 90
  long_term_media_renewal_registry_verifier_bound: true
  long_term_media_renewal_registry_verifier_quorum_ok: true
  long_term_media_renewal_registry_jurisdictions:
    - JP-13
    - SG-01
  long_term_media_renewal_registry_response_timeout_ms: 250
  key_succession_signer_roster_quorum_jurisdictions:
    - JP-13
    - SG-01
  raw_key_material_stored: false
  raw_shard_material_stored: false
  raw_signer_roster_payload_stored: false
  raw_jurisdiction_policy_payload_stored: false
  raw_quorum_threshold_policy_payload_stored: false
  raw_media_payload_stored: false
  raw_media_readback_payload_stored: false
  raw_media_revocation_payload_stored: false
  raw_media_refresh_payload_stored: false
  raw_media_registry_payload_stored: false
  raw_media_registry_response_payload_stored: false
  memory_replication_ledger_count: 1
