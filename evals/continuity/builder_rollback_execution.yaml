eval_id: builder_rollback_execution
target: selfctor.rollback
summary: >
  Builder staged rollout で regression が検出された時に、
  RollbackEngine が pre-apply Mirage Self snapshot を復元し、
  live enactment receipt に束縛された reverse-apply journal と actual reverse-apply command receipt、
  current checkout baseline に束縛された repo-bound verification receipt、
  actual current checkout 自体を mutate/restore する direct worktree receipt、
  detached git worktree 上の checkout-bound mutation receipt と repo-root external observer receipt、
  integrity reviewer の verifier-network attestation で rollback plan を束縛した telemetry gate を通したうえで、
  self/council/guardian への通知付きで append-only continuity rollback を完了すること
checks:
  - name: builder rollback demo smoke
    command: PYTHONPATH=src python3 -m omoikane.cli rollback-demo --json
expect:
  rollback_status: rolled-back
  live_enactment_status: passed
  rollback_trigger: eval-regression
  restored_snapshot_prefix: mirage://build-l5-rollback-0001/snapshot/pre-apply
  reverted_patch_count: 2
  reverse_apply_journal_count: 2
  reverse_apply_command_count: 2
  reverse_apply_verified_count: 2
  repo_bound_verified_count: 2
  repo_binding_scope: current-checkout-subtree
  repo_binding_path_count: 2
  checkout_mutation_status: verified
  checkout_mutation_path_count: 2
  checkout_mutation_cleanup_status: removed
  checkout_mutation_restored: true
  current_worktree_mutation_status: verified
  current_worktree_mutation_path_count: 2
  current_worktree_mutation_cleanup_status: removed
  current_worktree_mutation_restored: true
  external_observer_status: verified
  external_observer_receipt_count: 5
  external_observer_restored: true
  external_observer_stash_preserved: true
  reverse_apply_cleanup_status: removed
  reverted_stage_ids:
    - dark-launch
    - canary-5pct
  telemetry_gate_status: rollback-approved
  telemetry_gate_cleanup_status: removed
  telemetry_gate_command_count: 2
  continuity_event_ref_count: 2
  notification_ref_count: 3
  rollout_decision: rollback
  rollout_status: rolled-back
  self_modify_ledger_count: 9
