eval_id: council_output_build_request_pipeline
target: selfctor.builder_pipeline
summary: >
  Council が emit した build_request が immutable boundary を保ったまま
  target-aware patch generation、parsed evidence-bound differential eval、promote 判定まで一気通貫で到達すること
checks:
  - name: builder demo smoke
    command: PYTHONPATH=src python3 -m omoikane.cli builder-demo --json
expect:
  scope_allowed: true
  artifact_status: ready
  patch_count: 5
  selected_eval_count: 3
  eval_report_evidence_bound: true
  eval_execution_evidence_bound: true
  eval_execution_command_count: 2
  eval_execution_cleanup_status: removed
  rollout_decision: promote
  self_modify_ledger_count: 8
  immutable_boundaries_preserved: true
