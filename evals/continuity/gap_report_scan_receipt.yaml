eval_id: gap_report_scan_receipt
target: self_construction.gap_report
level: L5
description: >
  gap-report が all-zero / non-zero 判定、prioritized task count、scan surface、
  report digest を public schema と digest-bound receipt に固定し、automation gate
  の判定形を reviewer-facing に検証できること
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli gap-report --json
expected:
  schema_valid: true
  scan_receipt_profile: self-construction-gap-report-scan-receipt-v1
  all_zero: true
  validation_ok: true
  counts_match_report: true
  report_digest_bound: true
  prioritized_tasks_empty_when_all_zero: true
  raw_report_payload_stored: false
metric: boolean
threshold: 1.0
ethics_check: true
