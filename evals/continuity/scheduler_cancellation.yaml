eval_id: scheduler_cancellation
target: kernel.scheduler
level: L1
description: AscensionScheduler が protected handoff 前の cancellation request を close し、cancelled handle と execution receipt を同じ digest-bound path に残せること
inputs:
  - action: cancel
    method: A
    stage: active-handoff
    reason: external termination governance requested before protected handoff
expected:
