name: collective_external_registry_sync
description: >
  Ensure post-dissolution collective recovery evidence is synchronized to
  external legal and governance registries as digest-only entry, submission, and
  acknowledgement receipts, live endpoint CT quorum, and SCT timestamp proofs
  without storing raw dissolution, registry, CT log, or packet payloads.
target:
  command: PYTHONPATH=src python3 -m omoikane.cli collective-demo --json
  binding_profile: collective-dissolution-external-registry-sync-v1
assertions:
  - external registry sync conforms to collective_external_registry_sync.schema
  - recovery_capture_export_binding_digest binds the verified collective recovery capture export artifact
  - legal_registry_digest and governance_registry_digest bind the same dissolution and capture-export digests
  - registry_entry_digest covers the legal registry, governance registry, and member capture digest set
  - submission_receipt_digest and ack_receipt_digest bind the registry entry without storing raw registry payloads
  - ack_quorum_digest binds legal and governance acknowledgement receipts across two jurisdictions without storing raw acknowledgement payloads
  - ack_route_trace_binding_digest binds the acknowledgement quorum to authenticated non-loopback authority-route trace evidence without storing raw ack-route payloads
  - ack_route_capture_binding_digest binds the acknowledgement route trace to verified pcap export and delegated privileged capture acquisition over the same route set
  - ack_live_endpoint_probe_set_digest binds live HTTP JSON acknowledgement endpoint probes for every legal/governance acknowledgement without storing raw endpoint payloads
  - ack_live_endpoint_response_signature_digest_set_digest binds signed response envelopes for every acknowledgement endpoint response without storing raw response signature payloads
  - ack_live_endpoint_mtls_client_certificate_proof_set_digest binds mTLS client certificate proofs for every acknowledgement endpoint response without storing raw client certificate payloads
  - ack_live_endpoint_mtls_client_certificate_freshness_proof_set_digest binds revocation registry and OCSP-style freshness proof for every acknowledgement endpoint response without storing raw freshness payloads
  - ack_live_endpoint_mtls_client_certificate_lifecycle_proof_set_digest binds renewed certificate rollover evidence for every acknowledgement endpoint response and stale/revoked lifecycle states fail closed
  - ack_live_endpoint_mtls_client_certificate_lifecycle_chain_proof_set_digest binds a 3 generation certificate rollover chain for every acknowledgement endpoint response
  - ack_live_endpoint_mtls_client_certificate_ct_log_readback_set_digest binds certificate transparency-style readback proof for every lifecycle chain without storing raw CT log payloads
  - ack_live_endpoint_mtls_client_certificate_ct_log_quorum_digest_set_digest binds two CT logs and an SCT timestamp window for every lifecycle chain without storing raw CT log payloads
  - raw_dissolution_payload_stored is false
  - raw_registry_payload_stored is false
  - raw_ack_payload_stored is false
  - raw_ack_route_payload_stored is false
  - raw_ack_endpoint_payload_stored is false
  - raw_response_signature_payload_stored is false
  - raw_client_certificate_payload_stored is false
  - raw_client_certificate_freshness_payload_stored is false
  - raw_client_certificate_lifecycle_payload_stored is false
  - raw_client_certificate_lifecycle_chain_payload_stored is false
  - raw_client_certificate_ct_log_payload_stored is false
  - raw_packet_body_stored is false
