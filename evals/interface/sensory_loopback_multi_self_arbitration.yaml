eval_id: sensory_loopback_multi_self_arbitration
target: interface.sensory_loopback
level: L6
description: >
  Sensory Loopback が collective / IMC 共有空間で bounded multi-self session を開き、
  participant binding と owner handoff を保ったまま guardian-mediated arbitration を
  digest-only artifact family に残せること
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli sensory-loopback-demo --json
expected:
