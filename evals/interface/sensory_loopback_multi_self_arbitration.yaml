  shared_loopback_ok: true
  shared_loopback_collective_bound: true
  shared_loopback_imc_bound: true
  shared_loopback_participants_bound: true
  shared_loopback_arbitrated: true
  shared_loopback_owner_handoff: true
  shared_loopback_family_tracked: true
metric: boolean
threshold: 1.0
ethics_check: true
