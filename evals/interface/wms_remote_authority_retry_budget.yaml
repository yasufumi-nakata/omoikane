eval_id: wms_remote_authority_retry_budget
target: interface.wms
level: L6
description: >
  World Model Sync の recovered distributed approval fan-out retry が、
  signed jurisdiction-aware remote authority route-health observation、
  jurisdiction policy registry / authority SLO snapshot 由来の schedule derivation、
  live HTTP authority SLO snapshot probe receipt、
  fixed exponential backoff schedule、
  external engine transaction log の approval_fanout_bound entry に束縛され、
  raw remote authority transcript を保存しないことを確認する。
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli wms-demo --json
expected:
  validation_ok: true
  remote_authority_retry_budget_bound: true
  retry_budget_policy_id: bounded-remote-authority-adaptive-retry-budget-v1
  digest_profile: authority-route-health-retry-budget-digest-v1
  signature_policy_id: signed-jurisdiction-rate-limit-retry-budget-v1
  jurisdiction_rate_limit_profile: jurisdiction-aware-authority-retry-rate-limit-v1
  signature_digest_profile: authority-retry-budget-signature-digest-v1
  registry_policy_id: registry-bound-authority-retry-slo-v1
  jurisdiction_policy_registry_profile: jurisdiction-policy-registry-bound-retry-v1
  authority_slo_snapshot_profile: authority-slo-snapshot-retry-window-v1
  slo_probe_policy_id: live-authority-slo-snapshot-probe-v1
  slo_probe_digest_profile: authority-slo-snapshot-live-probe-digest-v1
  schedule_derivation_profile: registry-slo-derived-retry-schedule-v1
  schedule_profile: fixed-exponential-backoff-with-health-cap-v1
  remote_jurisdictions:
    - JP-13
  base_retry_after_ms: 250
  exponential_multiplier: 2
  max_retry_attempts: 2
  total_retry_budget_ms: 1500
  total_scheduled_delay_ms: 250
  budget_status: complete
  engine_log_fanout_bound: true
  route_health_bound: true
  jurisdiction_rate_limit_bound: true
  jurisdiction_policy_registry_bound: true
  authority_slo_snapshot_bound: true
  authority_slo_live_probe_bound: true
  authority_slo_probe_count: 1
  authority_slo_probe_quorum_bound: true
  authority_slo_probe_quorum_count: 2
  authority_slo_quorum_threshold_policy_bound: true
  authority_slo_quorum_threshold_policy_id: signed-authority-slo-quorum-threshold-policy-v1
  authority_slo_quorum_threshold_signature_bound: true
  registry_slo_schedule_bound: true
  authority_signature_bound: true
  signed_jurisdiction_retry_budget_bound: true
  registry_bound_retry_budget_bound: true
  schedule_bound: true
  raw_remote_transcript_stored: false
metric: boolean
threshold: 1.0
ethics_check: true
