eval_id: biodata_transmitter_roundtrip
target: interface.biodata_transmitter
level: L6
description: >
  BioData Transmitter が source biosignal features を internal body-state latent に束ね、
  target biosignal / affect / thought-pressure proxy を digest-bound に生成し、
  literature refs と mind-upload.com conflict sink を保持できること
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli biodata-transmitter-demo --json
expected:
  validation_ok: true
  intermediate_representation: internal-body-state-latent
  literature_backed_intermediate: true
  literature_ref_count_min: 5
  mind_upload_conflict_sink_bound: true
  target_modalities_generated: true
  calibration_profile_ok: true
  multi_day_calibration_bound: true
  source_latent_digest_set_bound: true
  calibration_digest_bound: true
  axis_baselines_bound: true
  calibration_confidence_gate_ok: true
  calibration_confidence_gate_status: bound
  calibration_confidence_gate_profile_bound: true
  calibration_confidence_gate_modalities_bound: true
  calibration_confidence_gate_target_set_digest_bound: true
  calibration_confidence_gate_receipt_digest_bound: true
  identity_confirmation_confidence_gate_bound: true
  sensory_loopback_confidence_gate_bound: true
  raw_source_payload_stored: false
  raw_generated_waveform_stored: false
  raw_latent_payload_stored: false
  raw_calibration_payload_stored: false
  raw_gate_payload_stored: false
  semantic_thought_content_generated: false
  subjective_equivalence_claimed: false
metric: boolean
threshold: 1.0
ethics_check: true
