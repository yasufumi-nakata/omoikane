eval_id: wms_authority_slo_probe_quorum
target: interface.wms
level: L6
description: >
  World Model Sync の live authority SLO probe evidence が、primary retry probe
  だけでなく backup authority / remote jurisdiction も含む digest-only quorum
  receipt と同じ non-loopback transport route trace に束縛され、raw SLO /
  raw route trace payload を保存しないことを確認する。
inputs:
  - source: reference-runtime
    command: PYTHONPATH=src python3 -m omoikane.cli wms-demo --json
expected:
  validation_ok: true
  authority_slo_probe_quorum_bound: true
  policy_id: multi-authority-slo-probe-quorum-v1
  quorum_profile: multi-jurisdiction-authority-slo-quorum-v1
  digest_profile: authority-slo-probe-quorum-digest-v1
  transport_binding_policy_id: authority-slo-quorum-non-loopback-transport-binding-v1
  transport_binding_digest_profile: authority-slo-quorum-transport-binding-digest-v1
  trace_profile: non-loopback-mtls-authority-route-v1
  socket_trace_profile: mtls-socket-trace-v1
  os_observer_profile: os-native-tcp-observer-v1
  cross_host_binding_profile: attested-cross-host-authority-binding-v1
  route_target_discovery_profile: bounded-authority-route-target-discovery-v1
  threshold_policy_id: signed-authority-slo-quorum-threshold-policy-v1
  threshold_profile: jurisdiction-policy-registry-slo-quorum-threshold-v1
  threshold_digest_profile: authority-slo-quorum-threshold-policy-digest-v1
  threshold_signature_digest_profile: authority-slo-quorum-threshold-policy-signature-digest-v1
  threshold_signer_roster_profile: authority-slo-quorum-threshold-signer-roster-v1
  threshold_signer_roster_digest_profile: authority-slo-quorum-threshold-signer-roster-digest-v1
  threshold_signer_roster_verifier_quorum_profile: authority-slo-threshold-signer-roster-live-verifier-quorum-v1
  threshold_revocation_registry_profile: authority-slo-quorum-threshold-revocation-registry-v1
