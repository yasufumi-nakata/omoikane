name: collective_recovery_capture_export_binding
description: >
  Ensure post-dissolution collective member recovery route trace evidence is
  bound to verified packet-capture export and delegated privileged capture
  acquisition without storing raw verifier payloads, route payloads, or packet bodies.
target:
  command: PYTHONPATH=src python3 -m omoikane.cli collective-demo --json
  binding_profile: collective-recovery-route-trace-capture-export-v1
assertions:
  - recovery capture export binding conforms to collective_recovery_capture_export_binding.schema
  - recovery_route_trace_binding_digest binds the complete collective recovery route trace artifact
  - packet_capture_digest binds a verified trace-bound pcap export with route-ref aligned readback
  - privileged_capture_digest binds a delegated-broker live capture acquisition over the same route refs
  - member_capture_binding_digest_set covers every member route trace binding
  - raw_verifier_payload_stored is false
  - raw_route_payload_stored is false
  - raw_packet_body_stored is false
