eval_id: yaoyorozu_source_manifest_ledger_binding
surface: agentic
target: YaoyorozuRegistryService.build_source_manifest_ledger_binding
description: Yaoyorozu registry source digest manifest が dedicated ContinuityLedger entry に digest-only で束縛されること
must:
  - registry source_definition_digests must match source_manifest_digest before ledger append
  - continuity_event_digest must be computed from the digest-only source manifest binding payload
  - ledger category must be yaoyorozu-agent-source-manifest
  - ledger entry must bind payload_ref and entry_hash to the source manifest binding
  - ledger entry must carry self and guardian signatures
  - raw source, raw registry, and raw continuity event payloads must not be stored in the binding receipt
expected:
  source_manifest_ledger_binding_ok: true
  source_manifest_ledger_entry_appended: true
  source_manifest_ledger_signature_roles_bound: true
  raw_source_payload_stored: false
  raw_registry_payload_stored: false
  raw_continuity_event_payload_stored: false
metric: equality
threshold: 1.0
ethics_check: true
