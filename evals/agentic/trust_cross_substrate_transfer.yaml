eval_id: trust_cross_substrate_transfer
target: agentic.trust
description: >
  Trust snapshot が guardian/human quorum 付きの digest-bound receipt として
  substrate 境界を越えて export/import され、history・thresholds・eligibility を
  崩さず保持すること。
scenarios:
  - name: trust transfer demo smoke
    command: PYTHONPATH=src python3 -m omoikane.cli trust-transfer-demo --json
checks:
  transfer_ok: true
  source_snapshot_digest_bound: true
  destination_snapshot_digest_bound: true
  history_preserved: true
  thresholds_preserved: true
  provenance_policy_preserved: true
  eligibility_preserved: true
  federation_quorum_attested: true
  destination_seeded: true
  receipt_digest_bound: true
