eval_id: trust_cross_substrate_transfer
target: agentic.trust
description: >
  Trust snapshot が guardian/human quorum 付きの digest-bound receipt として
  substrate 境界を越えて export/import され、live remote verifier federation と
  fixed re-attestation cadence、multi-root / cross-jurisdiction recovery quorum、
  destination renewal/revocation/recovery lifecycle、recovered-branch review summary、
  notice authority / legal execution scope の disclosure floor、verifier disclosure floor を
  保持しつつ history・thresholds・eligibility を崩さず保持すること。
scenarios:
  - name: trust transfer demo smoke
    command: PYTHONPATH=src python3 -m omoikane.cli trust-transfer-demo --json
  - name: trust transfer redacted export smoke
    command: PYTHONPATH=src python3 -m omoikane.cli trust-transfer-demo --export-profile bounded-trust-transfer-redacted-export-v1 --json
checks:
  transfer_ok: true
  source_snapshot_digest_bound: true
  destination_snapshot_digest_bound: true
  history_preserved: true
  thresholds_preserved: true
  provenance_policy_preserved: true
  eligibility_preserved: true
  federation_quorum_attested: true
  live_remote_verifier_attested: true
  remote_verifier_receipts_bound: true
  remote_verifier_disclosure_bound: true
  re_attestation_cadence_bound: true
  re_attestation_current: true
  destination_lifecycle_bound: true
  destination_lifecycle_disclosure_bound: true
  destination_renewal_history_bound: true
  destination_revocation_history_bound: true
  destination_recovery_history_bound: true
  recovery_quorum_bound: true
  recovery_review_bound: true
  recovery_notice_scope_bound: true
  destination_current: true
  destination_seeded: true
  receipt_digest_bound: true
