eval_id: yaoyorozu_agent_source_definition_contract
surface: agentic
target: YaoyorozuRegistryService.sync_registry
description: raw agents/**/*.yaml が registry materialization 前に schema-bound contract を満たすこと
must:
  - agent_source_definition.schema requires non-empty substrate_requirements
  - agent_source_definition.schema requires non-empty input_schema_ref and output_schema_ref
  - registry sync rejects raw source definitions with missing required fields
  - registry entries preserve non-empty substrate and schema refs after materialization
  - councilor source definitions must bind non-empty deliberation_scope_refs and deliberation_policy_ref before registry materialization
  - councilor registry entries preserve reviewer-facing deliberation scope and policy refs without storing raw deliberation transcripts
  - researcher source definitions must bind non-empty research_domain_refs and evidence_policy_ref before registry materialization
  - researcher registry entries preserve digest-safe research domain and evidence policy refs without storing raw research payloads
  - builder source definitions must bind non-empty build_surface_refs and execution_policy_ref before registry materialization
  - builder registry entries preserve repo-local build surface and execution policy refs before any handoff
  - guardian source definitions must bind non-empty oversight_scope_refs and attestation_policy_ref before registry materialization
  - guardian registry entries preserve reviewer-facing oversight scope and attestation policy refs without storing raw audit payloads
expected:
  agent_source_definition_schema_bound: true
  missing_schema_ref_rejected: true
  empty_substrate_rejected: true
  councilor_deliberation_scope_refs_required: true
  councilor_deliberation_policy_ref_required: true
  researcher_domain_refs_required: true
  researcher_evidence_policy_ref_required: true
  builder_surface_refs_required: true
  builder_execution_policy_ref_required: true
  guardian_oversight_scope_refs_required: true
  guardian_attestation_policy_ref_required: true
  registry_entries_non_empty_contract: true
