eval_id: yaoyorozu_workspace_discovery
target: agentic.yaoyorozu
level: L4
description: Yaoyorozu must discover a bounded same-host local workspace catalog with machine-readable builder coverage before any cross-workspace handoff is considered.
inputs:
  - review_budget: 3
  - workspace_count: 3
  - non_source_workspace_count: 2
expected:
  workspace_discovery_ok: true
  workspace_count: 3
  non_source_workspace_count: 2
  workspace_review_budget_respected: true
  cross_workspace_coverage_complete: true
metric: equality
threshold: 1.0
ethics_check: true
