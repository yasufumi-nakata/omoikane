eval_id: identity_confirmation_profile
target: kernel.identity.confirm_active_transition
level: L1
description: >
  Ascending から Active へ進める前に、episodic recall、SelfModel alignment、
  subjective self-report、third-party witness alignment を同じ digest-bound
  profile に束ね、全 dimension と witness quorum が pass した場合だけ
  active_transition_allowed=true になること。
fixtures:
  - scenario: multidimensional_profile_passes
    profile_id: multidimensional-identity-confirmation-v1
    expected:
      result: passed
      active_transition_allowed: true
      required_dimensions:
        - episodic_recall
        - self_model_alignment
        - subjective_self_report
        - third_party_witness_alignment
      witness_quorum_status: met
  - scenario: low_self_report_and_missing_witness_fail_closed
    expected:
      result: failed
      active_transition_allowed: false
      failure_reasons:
        - subjective-self-report-not-bound
        - third-party-witness-quorum-not-met
assertions:
  - Every confirmation profile must include exactly the four required dimensions.
  - Subjective self-report must be digest-bound to the subjective_self_report dimension.
  - Third-party witness alignment must meet a clinician + guardian quorum of two accepted receipts.
  - The confirmation_digest must cover the profile core excluding only confirmation_id, confirmed_at, and confirmation_digest.
  - Failed profiles must return failed-ascension-or-repeat-ascending instead of allowing Active transition.
metric: exact-match
threshold: 1.0
ethics_check: true
