$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://omoikane.dev/specs/schemas/council_argument.yaml"
title: CouncilArgument
description: A single serialized Council statement during debate.
type: object
additionalProperties: false
required:
  - kind
  - schema_version
  - session_id
  - round_index
  - phase
  - speaker
  - stance
  - claims
  - recommendation
properties:
  kind:
    const: council_argument
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  session_id:
    type: string
    minLength: 8
  round_index:
    type: integer
    minimum: 0
  phase:
    type: string
    enum:
      - opening
      - rebuttal
      - amendment
      - closing
  speaker:
    type: object
    additionalProperties: false
    required:
      - agent_id
      - role
    properties:
      agent_id:
        type: string
        minLength: 1
      role:
        type: string
        minLength: 1
      trust_score:
        type: number
        minimum: 0
        maximum: 1
  stance:
    type: string
    enum:
      - support
      - oppose
      - amend
      - veto
      - escalate
      - abstain
  claims:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - claim_id
        - text
      properties:
        claim_id:
          type: string
          minLength: 1
        text:
          type: string
          minLength: 1
        evidence_refs:
          type: array
          items:
            type: string
            minLength: 1
        risk_tags:
          type: array
          items:
            type: string
            minLength: 1
  rebuttals:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - target_claim_id
        - relation
        - text
      properties:
        target_claim_id:
          type: string
          minLength: 1
        relation:
          type: string
          enum:
            - agree
            - rebut
            - qualify
        text:
          type: string
          minLength: 1
  recommendation:
    type: object
    additionalProperties: false
    required:
      - action
      - rationale
    properties:
      action:
        type: string
        enum:
          - approve
          - reject
          - amend
          - escalate
          - defer
      rationale:
        type: string
        minLength: 1
      required_conditions:
        type: array
        items:
          type: string
          minLength: 1
  signature_ref:
    type: string
    minLength: 1
examples:
  - kind: council_argument
    schema_version: 1.0.0
    session_id: sess-self-mod-001
    round_index: 0
    phase: opening
    speaker:
      agent_id: conservatism-advocate
      role: ConservatismAdvocate
      trust_score: 0.62
    stance: amend
    claims:
      - claim_id: c1
        text: Rollback evidence must be attached before approval.
        evidence_refs:
          - docs/04-ai-governance/self-modification.md
    recommendation:
      action: amend
      rationale: Require explicit rollback evidence and continuity logging.
