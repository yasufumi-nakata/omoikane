$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://omoikane.dev/specs/schemas/build_artifact.yaml"
title: BuildArtifact
description: Canonical builder output describing emitted patches and evidence.
type: object
additionalProperties: false
required:
  - kind
  - schema_version
  - artifact_id
  - request_id
  - status
  - generated_at
  - artifacts
properties:
  kind:
    const: build_artifact
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  artifact_id:
    type: string
    minLength: 8
  request_id:
    type: string
    minLength: 8
  status:
    type: string
    enum:
      - ready
      - blocked
      - failed
  summary:
    type: string
    minLength: 1
  generated_at:
    type: string
    format: date-time
  artifacts:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - artifact_kind
        - ref
      properties:
        artifact_kind:
          type: string
          enum:
            - patch_descriptor
            - test_report
            - build_log
            - eval_report
            - rollback_plan
        ref:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
  patches:
    type: array
    items:
      $ref: "./patch_descriptor.schema"
  blocking_rules:
    type: array
    items:
      type: string
      minLength: 1
  test_results:
    type: object
    additionalProperties: false
    properties:
      build_status:
        type: string
        enum:
          - pass
          - fail
          - not-run
      eval_status:
        type: string
        enum:
          - pass
          - fail
          - not-run
      executed_evals:
        type: array
        items:
          type: string
          pattern: "^evals/"
  continuity_log_ref:
    type: string
    minLength: 1
allOf:
  - if:
      properties:
        status:
          const: ready
    then:
      properties:
        patches:
          minItems: 1
  - if:
      properties:
        status:
          const: blocked
    then:
      properties:
        blocking_rules:
          minItems: 1
examples:
  - kind: build_artifact
    schema_version: 1.0.0
    artifact_id: artifact-0001
    request_id: build-0001
    status: ready
    summary: Patch set and regression plan emitted.
    generated_at: "2026-04-18T10:00:00Z"
    artifacts:
      - artifact_kind: patch_descriptor
        ref: patch://0001
      - artifact_kind: test_report
        ref: report://tests-0001
    patches:
      - patch_id: patch-0001
        target_path: src/diff_eval.rs
        action: modify
        format: unified_diff
        summary: Add rollback barrier checks.
        safety_impact: medium
