    rationale: Required to express the ethics-coupled minimum energy floor.
  - priority: P1
    kind: idl
    file: specs/interfaces/agentic.council.v0.idl
    consumers:
      - reference-runtime
    rationale: Council lifecycle contract.
  - priority: P1
    kind: idl
    file: specs/interfaces/kernel.ethics.v0.idl
    consumers:
      - reference-runtime
    rationale: Ethics gate contract.
  - priority: P1
    kind: idl
    file: specs/interfaces/kernel.continuity.v0.idl
    consumers:
      - reference-runtime
    rationale: Continuity ledger contract.
  - priority: P1
    kind: idl
    file: specs/interfaces/selfctor.patch_generator.v0.idl
    consumers:
      - reference-runtime
    rationale: Builder patch generation contract.
  - priority: P1
    kind: idl
    file: specs/interfaces/selfctor.diff_eval.v0.idl
    consumers:
      - reference-runtime
    rationale: Differential evaluation contract.
  - priority: P1
    kind: idl
    file: specs/interfaces/agentic.task_graph.v0.idl
    consumers:
      - reference-runtime
    rationale: Task graph serialization and dispatch contract.
  - priority: P1
    kind: schema
    file: specs/schemas/qualia_tick.schema
