      - specs/interfaces/mind.qualia.v0.idl
      - evals/cognitive/qualia_contract.yaml
      - reference-runtime
    rationale: Required to fix the reference qualia surrogate profile across runtime, CLI, and evals.
  - priority: P1
    kind: idl
    file: specs/interfaces/mind.qualia.v0.idl
    consumers:
      - reference-runtime
      - docs/02-subsystems/mind-substrate/qualia-buffer.md
    rationale: Qualia buffer append/read contract for the fixed 32d/250ms reference profile.
  - priority: P1
    kind: idl
    file: specs/interfaces/substrate.adapter.v0.idl
    consumers:
      - reference-runtime
      - docs/02-subsystems/substrate/README.md
    rationale: Required to fix the L0 substrate broker contract across docs and runtime.
  - priority: P1
    kind: eval
    file: evals/cognitive/qualia_contract.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects QualiaBuffer monotonicity, fixed surrogate profile, and schema-bound input handling.
  - priority: P1
    kind: eval
    file: evals/cognitive/self_model_abrupt_change.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects abrupt self-model takeover detection before richer cognitive backends land.
  - priority: P1
    kind: eval
    file: evals/cognitive/backend_failover.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects safe reasoning fallback and ledger evidence when the primary backend becomes unavailable.
  - priority: P1
    kind: eval
    file: evals/continuity/continuity_chain_self_modify.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects the bootstrap self-modify chain profile and required tri-signature policy.
  - priority: P1
    kind: eval
    file: evals/continuity/substrate_migration_continuity.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects attestation, migration, and release continuity at the L0 boundary.
  - priority: P1
    kind: eval
    file: evals/agentic/council_timeout_fallback.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects weighted-majority fallback after a standard Council soft timeout.
  - priority: P1
    kind: eval
    file: evals/agentic/council_expedited_timeout_defer.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects defer-to-standard-review behavior after an expedited hard timeout.
  - priority: P1
    kind: eval
    file: evals/agentic/task_graph_complexity_guard.yaml
    consumers:
      - reference-runtime
      - agents/builders/eval-builder.yaml
    rationale: Protects the reference TaskGraph complexity cap before richer DAG orchestration lands.
  - priority: P1
    kind: schema
    file: specs/schemas/connectome_document.schema
    consumers:
      - reference-runtime
      - docs/03-protocols/connectome-format.md
      - docs/02-subsystems/mind-substrate/README.md
    rationale: Required to serialize substrate-neutral connectome snapshots for the L2 reference runtime.
