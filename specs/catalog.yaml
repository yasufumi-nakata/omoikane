  - priority: P0
    kind: schema
    file: specs/schemas/ethics_decision.yaml
    consumers:
      - agents/councilors/ethics-committee.yaml
    rationale: Ethics gate output for approval, veto, and escalation.
  - priority: P0
    kind: schema
    file: specs/schemas/build_request.yaml
    consumers:
